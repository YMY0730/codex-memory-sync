<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Memory Sync</title>
<style>
:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--text2:#64748b;--accent:#3b82f6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--border:#e2e8f0;--hover:#f1f5f9;--nav-bg:#1e293b;--nav-text:#e2e8f0;--r:12px;--rs:8px;--user-bg:#dbeafe;--user-border:#3b82f6;--asst-bg:#f3f4f6;--asst-border:#e5e7eb;--think-bg:#fef3c7;--think-text:#92400e;--tool-bg:#dbeafe;--tool-text:#1e40af;--meta-bg:#eef2ff;--meta-text:#4338ca;--event-bg:#f9fafb;--event-text:#9ca3af}
.dark{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--accent:#60a5fa;--green:#34d399;--amber:#fbbf24;--border:#334155;--hover:#1e293b;--user-bg:#1e3a5f;--user-border:#3b82f6;--asst-bg:#1f2937;--asst-border:#374151;--think-bg:#713f12;--think-text:#fde68a;--tool-bg:#1e3a5f;--tool-text:#93c5fd;--meta-bg:#312e81;--meta-text:#a5b4fc;--event-bg:#111827;--event-text:#6b7280}
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.6 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
nav{width:210px;background:var(--nav-bg);color:var(--nav-text);padding:24px 0;display:flex;flex-direction:column;flex-shrink:0}
nav .logo{padding:0 18px 20px;font-size:17px;font-weight:700;user-select:none}
nav .logo span{color:var(--accent)}
nav a{display:block;padding:8px 18px;color:var(--nav-text);text-decoration:none;font-size:13px;border-left:3px solid transparent;transition:.15s;cursor:pointer;user-select:none}
nav a:hover,nav a.active{background:rgba(255,255,255,.06);border-left-color:var(--accent)}
nav button{display:block;width:100%;padding:8px 18px;margin-top:auto;color:var(--nav-text);background:none;border:none;cursor:pointer;font-size:13px;text-align:left}
main{flex:1;padding:28px;overflow-y:auto;max-width:calc(100vw - 210px)}
h2{font-size:20px;margin-bottom:16px;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid var(--border)}
.stat-card .icon{font-size:24px;margin-bottom:4px}
.stat-card .num{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:11px;color:var(--text2)}
.card{background:var(--card);border-radius:var(--r);padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid var(--border);margin-bottom:16px}
.split{display:grid;grid-template-columns:280px 1fr;gap:12px}
.split-40-60{display:grid;grid-template-columns:2fr 3fr;gap:12px}
.file-list{max-height:460px;overflow-y:auto}
.file-item{display:flex;align-items:center;padding:5px 8px;cursor:pointer;border-radius:var(--rs);font-size:12px;gap:6px;transition:background .1s}
.file-item:hover{background:var(--hover)}
.file-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .size{color:var(--text2);font-size:10px;white-space:nowrap}
.file-item.unindexed .name{font-style:italic;color:var(--text2)}
.badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:600;margin-left:4px}
.badge-idx{background:var(--green);color:#fff}
.badge-uidx{background:var(--amber);color:#fff}
.breadcrumb{display:flex;align-items:center;gap:8px;padding:0 4px 10px;font-size:12px;color:var(--text2)}
.breadcrumb button{background:var(--hover);border:1px solid var(--border);border-radius:var(--rs);padding:3px 10px;font-size:11px;cursor:pointer;color:var(--text)}
.chat-view{max-height:460px;overflow-y:auto}
.chat-msg{margin-bottom:6px;font-size:12px;line-height:1.5}
.chat-msg .ts{font-size:9px;color:var(--text2);margin-bottom:2px}
.chat-msg .body{padding:8px 12px;border-radius:var(--r);border:1px solid transparent}
.chat-msg.user{padding-left:24px}
.chat-msg.user .body{background:var(--user-bg);border-color:var(--user-border)}
.chat-msg.assistant .body{background:var(--asst-bg);border-color:var(--asst-border)}
.chat-msg.meta .body{background:var(--meta-bg);border-color:transparent;color:var(--meta-text);text-align:center;font-size:10px}
.chat-msg.event .body{background:var(--event-bg);color:var(--event-text);text-align:center;font-size:10px;padding:4px 8px}
.chat-msg.thinking .body{background:var(--think-bg);color:var(--think-text);font-size:11px;font-style:italic}
.chat-msg.tool .body{background:var(--tool-bg);color:var(--tool-text);font-family:monospace;font-size:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--rs);border:none;cursor:pointer;font-size:12px;font-weight:500;transition:.15s;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.9}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.85}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--hover)}
.btn-sm{padding:3px 8px;font-size:10px}.btn-block{display:block;width:100%;justify-content:center;margin-top:6px}
input,select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:12px;background:var(--card);color:var(--text);margin-bottom:6px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.toast{position:fixed;top:20px;right:20px;padding:10px 18px;border-radius:var(--rs);font-size:12px;z-index:100;opacity:0;transform:translateY(-8px);transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green);color:#fff}.toast.err{background:var(--red);color:#fff}
.empty{text-align:center;padding:30px;color:var(--text2)}.empty .big{font-size:44px;margin-bottom:6px}
pre.code{white-space:pre-wrap;font-size:11px;font-family:Consolas,monospace;max-height:460px;overflow-y:auto;padding:10px;background:var(--hover);border-radius:var(--rs)}
.result{font-size:11px;line-height:1.5}.result pre{white-space:pre-wrap;background:var(--hover);padding:10px;border-radius:var(--rs)}
.bottom-btns{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.chk-row{display:flex;align-items:center;padding:4px 6px;font-size:11px;cursor:pointer;border-radius:6px;gap:6px;transition:background .1s}
.chk-row:hover{background:var(--hover)}
.chk-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;margin:0}
.chk-row .chk-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chk-row .chk-size{color:var(--text2);font-size:10px;white-space:nowrap}
.chk-summary{font-size:11px;color:var(--text2);padding:8px 0;border-top:1px solid var(--border);margin-top:6px}
.bridge-row{display:flex;gap:12px}
.bridge-card{flex:1;background:var(--card);border-radius:var(--r);padding:18px;border:1px solid var(--border)}
.bridge-card h4{font-size:14px;margin-bottom:6px}
.bridge-card .sub{color:var(--text2);font-size:11px;margin-bottom:12px}
@media(max-width:768px){.bridge-row{flex-direction:column}}
@media(max-width:768px){nav{width:50px}nav .logo,nav a,nav button{font-size:0;padding:8px 3px;text-align:center}main{padding:14px}.split,.split-40-60{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
<div class="logo"><span>🧠</span> Codex Sync</div>
<a data-page="home" class="active">🏠 仪表盘</a>
<a data-page="local">💻 本地文件</a>
<a data-page="sessions">💬 会话浏览</a>
<a data-page="bridge">🔄 跨工具</a>
<a data-page="export">📦 导出</a>
<button id="themeBtn">🌙 暗色</button>
</nav>
<main id="main"><div class="empty"><div class="big">⏳</div>加载中...</div></main>
<div id="toast" class="toast"></div>
<script>
var main=document.getElementById('main'),toast=document.getElementById('toast');

// Theme
var isDark=false;
function setTheme(d){
 isDark=d;document.body.classList.toggle('dark',d);
 document.getElementById('themeBtn').textContent=d?'☀️ 亮色':'🌙 暗色';
 try{localStorage.setItem('cms-theme',d?'dark':'light')}catch(e){}
}
try{if(localStorage.getItem('cms-theme')==='dark')setTheme(true)}catch(e){}
document.getElementById('themeBtn').onclick=function(){setTheme(!isDark)};

// toast
function showToast(msg,err){
 toast.textContent=msg;toast.className='toast '+(err?'err':'ok')+' show';
 setTimeout(function(){toast.className='toast'},2200);
}

// API
function api(url,opts){
 var init={headers:{'Content-Type':'application/json'}};
 if(opts){if(opts.method)init.method=opts.method;if(opts.body)init.body=opts.body;}
 return fetch(url,init).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()});
}

// helpers
function esc(s){var d=document.createElement('div');d.textContent=(s||'');return d.innerHTML}
function jesc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function fb(b){return b?(b<1024?b+' B':(b/1024).toFixed(1)+' KB'):''}

// Nav
document.querySelectorAll('nav a[data-page]').forEach(function(a){
 a.onclick=function(){
  document.querySelectorAll('nav a[data-page]').forEach(function(x){x.classList.remove('active')});
  a.classList.add('active');loadPage(a.getAttribute('data-page'));
 };
});

// Page router
function loadPage(page){
 main.innerHTML='<div class="empty"><div class="big">⏳</div></div>';
 var fns={'home':loadDashboard,'local':loadLocal,'sessions':loadSessions,'bridge':loadBridge,'export':loadExport};
 try{(fns[page]||loadDashboard)()}catch(e){main.innerHTML='<div class="empty"><div class="big">❌</div>'+esc(e.message)+'</div>'}
}

// === Dashboard ===
function loadDashboard(){
 api('/api/stats').then(function(s){
  main.innerHTML='<h2>🏠 仪表盘</h2>'+
   statGrid(s)+
   '<div class="card"><b>📂 Codex</b><p style="color:var(--text2);margin-top:6px;font-size:12px">'+esc(s.paths.root||'未检测到')+'</p></div>'+
   '<div class="card"><b>⚙️ 模式</b><p style="margin-top:4px;font-size:12px">'+(s.backend==='none'?'💻 本地':'☁️ '+esc(s.backend))+'</p>'+
    '<div class="bottom-btns"><button class="btn btn-primary" onclick="loadPage(\'bridge\')">🔄 跨工具同步</button><button class="btn btn-outline" onclick="loadPage(\'export\')">📦 导出</button></div></div>';
 }).catch(function(e){main.innerHTML='<div class="empty"><div class="big">❌</div>'+esc(e.message)+'</div>'});
}
function statGrid(s){
 return '<div class="stats">'+
  '<div class="stat-card"><div class="icon">📄</div><div class="num">'+s.memories.count+'</div><div class="label">记忆 · '+s.memories.size_fmt+'</div></div>'+
  '<div class="stat-card"><div class="icon">💬</div><div class="num">'+s.sessions.count+'</div><div class="label">会话 · '+s.sessions.size_fmt+'</div></div>'+
  '<div class="stat-card"><div class="icon">📋</div><div class="num">'+s.rules.count+'</div><div class="label">规则 · '+s.rules.size_fmt+'</div></div>'+
  '<div class="stat-card"><div class="icon">📦</div><div class="num">'+s.total.count+'</div><div class="label">总计 · '+s.total.size_fmt+'</div></div>'+
 '</div>';
}

// === Local files ===
function loadLocal(){
 api('/api/local/files').then(function(d){
  var L='<div class="file-list">'+fileGroup('📁 记忆',d.memories)+fileGroup('💬 会话',d.sessions)+fileGroup('📋 规则',d.rules)+'</div>';
  main.innerHTML='<h2>💻 本地</h2><div class="split"><div class="card" style="padding:14px">'+L+'</div><div class="card" style="padding:14px"><div id="pv"><div class="empty"><div class="big">👁️</div>点击左侧预览</div></div></div></div>';
 }).catch(function(e){main.innerHTML='<div class="empty"><div class="big">❌</div>'+esc(e.message)+'</div>'});
}
function fileGroup(title,items){
 if(!items||!items.length)return'';
 var h='<div style="font-weight:700;font-size:11px;color:var(--text2);padding:6px 4px;border-top:1px solid var(--border)">'+title+'</div>';
 items.forEach(function(f){
  h+='<div class="file-item" data-path="'+jesc(f.path||'')+'" onclick="doPreview(this)"><span class="name">'+esc(f.name)+'</span><span class="size">'+fb(f.size)+'</span></div>';
 });
 return h;
}
// Unified preview
function doPreview(el){
 var path=el.getAttribute('data-path')||'';
 var area=document.getElementById('pv');
 if(!area){area=document.createElement('div');area.id='pv';el.parentNode.parentNode.appendChild(area);}
 if(!path){area.innerHTML='<div class="empty"><div class="big">📁</div>目录</div>';return}
 area.innerHTML='<div class="empty"><div class="big">⏳</div></div>';
 api('/api/preview?path='+encodeURIComponent(path)).then(function(d){
  area.innerHTML=d.type==='chat'?renderChat(d.messages):'<div style="font-size:10px;color:var(--text2);margin-bottom:6px">📄 '+esc(d.name)+' · '+(d.size||'')+'</div><pre class="code">'+esc(d.content||'')+'</pre>';
 }).catch(function(e){area.innerHTML='<div class="empty"><div class="big">❌</div>'+esc(e.message)+'</div>'});
}

// Chat renderer
function renderChat(msgs){
 if(!msgs||!msgs.length)return'<div style="text-align:center;color:var(--text2);padding:20px">该会话没有可解析的消息</div>';
 var types={};msgs.forEach(function(m){var k=m.kind||'?';types[k]=(types[k]||0)+1});
 var h='<div style="font-size:10px;color:var(--text2);margin-bottom:6px">';
 var labels={meta:'📋',event:'📋',message:'💬',thinking:'💭',tool:'🔧'};
 Object.keys(types).forEach(function(k){h+=labels[k]||k;h+=' '+types[k]+' ';});
 h+='</div><div class="chat-view">';
 msgs.forEach(function(m){
  var k=m.kind||'message',r=m.role||'',t=m.text||'',ts=m.timestamp||'';
  if(k==='meta')h+='<div class="chat-msg meta"><div class="body">📋 '+esc(t)+'</div></div>';
  else if(k==='event')h+='<div class="chat-msg event"><div class="body">'+esc(t)+'</div></div>';
  else if(k==='thinking')h+='<div class="chat-msg thinking"><div class="body">💭 '+esc((t||'').substring(0,300))+'</div></div>';
  else if(k==='tool')h+='<div class="chat-msg tool"><div class="body">🔧 '+esc((t||'').substring(0,300))+'</div></div>';
  else{var cls=r==='user'?'user':'assistant';h+='<div class="chat-msg '+cls+'"><div class="ts">'+(ts||'')+'</div><div class="body">'+esc(t)+'</div></div>';}
 });
 h+='</div>';return h;
}

// === Sessions ===
function loadSessions(){
 var p1=api('/api/codex/sessions').catch(function(){return{indexed:[],unindexed:[]}});
 var p2=api('/api/opencode/directories').catch(function(){return[]});
 Promise.all([p1,p2]).then(function(r){
  var cx=r[0],ocD=r[1];
  var allCx=(cx.indexed||[]).concat(cx.unindexed||[]);
  var L='<div class="file-list">';
  L+='<div style="font-weight:700;font-size:11px;color:var(--text2);padding:6px 4px;border-top:1px solid var(--border)">🧠 Codex ('+allCx.length+')</div>';
  allCx.forEach(function(s){L+='<div class="file-item" data-path="'+jesc(s.path||'')+'" onclick="previewSession(this)" style="padding:6px 8px"><span class="name">'+esc(s.name)+'</span><span class="size">'+esc(s.size_fmt||fb(s.size))+'</span></div>';});
  L+='<div style="font-weight:700;font-size:11px;color:var(--text2);padding:6px 4px;border-top:1px solid var(--border);margin-top:12px">💬 OpenCode ('+(ocD||[]).length+' dirs)</div>';
  (ocD||[]).forEach(function(d){
   var nm=d.display_name||d.directory||'?';
   L+='<div class="file-item" style="padding:6px 8px;font-weight:600"><span class="name">📁 '+esc(nm)+'</span><span class="size">'+d.session_count+' sessions</span></div>';
   d.sessions.forEach(function(s){
    var pv=s.preview||'';if(pv.length>60)pv=pv.substring(0,60)+'...';
    L+='<div class="file-item" data-sid="'+s.id+'" onclick="viewOCSessionFull(this)" style="padding:3px 8px;font-size:11px;margin-left:12px"><span class="name">💬 '+esc(s.title)+'</span><span class="size">'+s.message_count+' msg</span></div>';
    if(pv)L+='<div style="font-size:9px;color:var(--text2);padding:0 36px 2px">'+esc(pv)+'</div>';
   });
  });
  L+='</div>';
  main.innerHTML='<h2>💬 会话</h2><div class="split"><div class="card" style="padding:14px">'+L+'</div><div class="card" style="padding:14px"><div id="spv"><div class="empty"><div class="big">👁️</div>点击左侧预览</div></div></div></div>';
 }).catch(function(e){main.innerHTML='<div class="empty"><div class="big">❌</div>'+esc(e.message)+'</div>'});
}
function previewSession(el){
 var path=el.getAttribute('data-path')||'',area=document.getElementById('spv');if(!path||!area)return;
 area.innerHTML='<div class="empty"><div class="big">⏳</div></div>';
 api('/api/preview?path='+encodeURIComponent(path)).then(function(d){area.innerHTML=d.type==='chat'?renderChat(d.messages):'<pre class="code">'+esc(d.content||'')+'</pre>';}).catch(function(e){area.innerHTML='<div class="empty"><div class="big">❌</div>'+esc(e.message)+'</div>'});
}

// === Bridge ===
function loadBridge(){
 var p1=api('/api/codex/sessions').catch(function(){return{indexed:[],unindexed:[]}});
 var p2=api('/api/opencode/sessions').catch(function(){return[]});
 Promise.all([p1,p2]).then(function(r){
  var cx=r[0],oc=r[1];
  var allCx=(cx.indexed||[]).concat(cx.unindexed||[]);

  // Codex sessions checklist
  var cxList='<div style="padding:4px 0">';
  cxList+='<a href="javascript:void(0)" onclick="toggleAllCx(true)" style="font-size:10px;margin-right:8px">☑ 全选</a>';
  cxList+='<a href="javascript:void(0)" onclick="toggleAllCx(false)" style="font-size:10px">☐ 取消</a>';
  cxList+='<span class="chk-summary" id="cxSummary">已选 0 项</span></div>';
  allCx.forEach(function(s,i){
   cxList+='<div class="chk-row" data-idx="'+i+'" onclick="this.querySelector(\'input\').click()"><input type="checkbox" class="cxChk" data-path="'+jesc(s.path||'')+'" onchange="updateCxSummary()"><span class="chk-label">'+esc(s.name)+'</span><span class="chk-size">'+esc(s.size_fmt||fb(s.size))+'</span></div>';
  });
  cxList+='</div>';

  // OpenCode sessions dropdown
  var opts='';oc.forEach(function(s){opts+='<option value="'+s.id+'">'+esc(s.title)+' ('+s.message_count+' msg)</option>'});

  main.innerHTML=
   '<h2>🔄 跨工具同步</h2>'+
   '<div class="bridge-row">'+
    '<div class="bridge-card">'+
     '<h4>🧠 Codex → OpenCode</h4>'+
     '<div class="sub">共 '+allCx.length+' 个会话（'+cx.indexed.length+' 已索引 + '+cx.unindexed.length+' 未索引）</div>'+
     '<button class="btn btn-primary btn-sm" style="margin-bottom:6px" onclick="bridgeAction(\'c2o\',\'agents\')">📄 AGENTS.md</button>'+
     '<button class="btn btn-primary btn-sm" style="margin-bottom:6px;margin-left:4px" onclick="bridgeAction(\'c2o\',\'skills\')">📁 Skills</button>'+
     '<button class="btn btn-primary btn-sm" style="margin-bottom:6px;margin-left:4px" onclick="bridgeAction(\'c2o\',\'memories\')">🧠 记忆 → AGENTS.md</button>'+
     '<div style="max-height:280px;overflow-y:auto;margin:10px 0">'+cxList+'</div>'+
     '<button class="btn btn-primary btn-block" onclick="importSelectedCx()">📤 导入勾选会话到 OpenCode</button>'+
     '<div style="margin-top:4px;font-size:9px;color:var(--text2)">💡 OpenCode 重启后可见。导入不会覆盖已有数据。</div>'+
    '</div>'+
    '<div class="bridge-card">'+
     '<h4>💬 OpenCode → Codex</h4>'+
     '<div class="sub">'+oc.length+' 个会话</div>'+
     '<button class="btn btn-green btn-sm" style="margin-bottom:6px" onclick="bridgeAction(\'o2c\',\'agents\')">📄 AGENTS.md</button>'+
     '<button class="btn btn-green btn-sm" style="margin-bottom:6px;margin-left:4px" onclick="bridgeAction(\'o2c\',\'skills\')">📁 Skills</button>'+
     '<select id="bOCsel" style="margin:8px 0"><option value="">导出所有会话到 Codex</option>'+opts+'</select>'+
     '<button class="btn btn-green btn-block" onclick="bridgeAction(\'o2c\',\'sessions\')">📥 导出到 Codex</button>'+
     '<button class="btn btn-green btn-block" style="margin-top:4px" onclick="bridgeAction(\'o2c\',\'all\')">🔄 全部导出到 Codex</button>'+
    '</div>'+
   '</div>'+
   '<div id="brResult" class="card result" style="margin-top:12px"></div>';
 }).catch(function(e){main.innerHTML='<div class="empty"><div class="big">❌</div>'+esc(e.message)+'</div>'});
}

function toggleAllCx(on){
 var chks=document.querySelectorAll('.cxChk');chks.forEach(function(c){c.checked=on});updateCxSummary();
}
function updateCxSummary(){
 var chks=document.querySelectorAll('.cxChk:checked');
 var s=document.getElementById('cxSummary');if(s)s.textContent='已选 '+chks.length+' 项';
}
function importSelectedCx(){
 var paths=[];document.querySelectorAll('.cxChk:checked').forEach(function(c){paths.push(c.getAttribute('data-path'))});
 if(!paths.length){showToast('请先勾选要导入的会话',true);return}
 var res=document.getElementById('brResult');if(res)res.innerHTML='<div style="text-align:center;padding:16px;color:var(--text2)">⏳ 正在导入 '+paths.length+' 个会话...</div>';
 api('/api/bridge/c2o',{method:'POST',body:JSON.stringify({action:'sessions',session_paths:paths})}).then(function(r){
  if(res)res.innerHTML='<pre>'+esc(JSON.stringify(r,null,2))+'</pre>';showToast('导入完成');
 }).catch(function(e){if(res)res.innerHTML='<span style="color:var(--red)">'+esc(e.message)+'</span>';showToast('导入失败',true)});
}
function bridgeAction(dir,action){
 var res=document.getElementById('brResult');if(res)res.innerHTML='<div style="text-align:center;padding:16px;color:var(--text2)">⏳ 同步中...</div>';
 var sel=document.getElementById('bOCsel');var sid=sel?sel.value:'';
 api('/api/bridge/'+dir,{method:'POST',body:JSON.stringify({action:action,session_id:sid||undefined})}).then(function(r){
  if(res)res.innerHTML='<pre>'+esc(JSON.stringify(r,null,2))+'</pre>';showToast('同步完成');
 }).catch(function(e){if(res)res.innerHTML='<span style="color:var(--red)">'+esc(e.message)+'</span>';showToast('同步失败',true)});
}

// === Export ===
function loadExport(){
 api('/api/stats').then(function(s){
  main.innerHTML='<h2>📦 导出</h2><div class="card">'+
   '<p>总计: <b>'+s.total.count+'</b> 个, <b>'+s.total.size_fmt+'</b></p>'+
   '<div style="margin:14px 0"><input id="expPath" value="'+(s.paths.root||'')+'/../codex-context.zip"></div>'+
   '<div style="margin:14px 0"><input id="expPwd" type="password" placeholder="密码（可选）"></div>'+
   '<button class="btn btn-primary" onclick="doExport()">📦 开始导出</button></div>';
 });
}
function doExport(){
 var p=document.getElementById('expPath').value,pwd=document.getElementById('expPwd').value;
 api('/api/export',{method:'POST',body:JSON.stringify({output:p,password:pwd||null})}).then(function(r){
  showToast(r.ok?'导出成功: '+r.path:'失败: '+r.error,!r.ok);
 }).catch(function(e){showToast('导出失败',true)});
}

loadPage('home');
</script>
</body>
</html>
